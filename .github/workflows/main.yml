name: BIST Tavan Tarama

on:
  schedule:
    # Istanbul UTC+3 -> UTC (3 saat geri)
    # 09:56 Istanbul = 06:56 UTC
    - cron: '56 6 * * 1-5'
    # 11:00 Istanbul = 08:00 UTC
    - cron: '0 8 * * 1-5'
    # 13:00 Istanbul = 10:00 UTC
    - cron: '0 10 * * 1-5'
    # 16:00 Istanbul = 13:00 UTC
    - cron: '0 13 * * 1-5'
    # 18:15 Istanbul = 15:15 UTC
    - cron: '15 15 * * 1-5'
  workflow_dispatch:

jobs:
  tavan-tarama:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bagimliliklar kur
        run: |
          pip install -r requirements.txt

      - name: Tavan Tarama Calistir
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: true
        run: |
          python scanner.py
